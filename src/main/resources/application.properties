spring.application.name=academic_service
server.port=8082

# Eureka Client (Discovery Server)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/academic_service?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configuration
jwt.secret=mi-clave-super-secreta-proyecto-final-123456789-idat-2026
jwt.expiration=3600000